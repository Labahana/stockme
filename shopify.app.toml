# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "daebef5eed493fc662878c8bd660bb0c"
name = "stockme"
application_url = "https://stockme.gentletap.co/api/auth"
embedded = true

[webhooks]
api_version = "2026-07"

  [[webhooks.subscriptions]]
  uri = "https://stockme.gentletap.co/api/webhooks"
  compliance_topics = [ "customers/data_request", "customers/redact", "shop/redact" ]
  topics = [
  "app/uninstalled",
  "app_subscriptions/update",
  "inventory_levels/update",
  "products/create",
  "products/delete",
  "products/update"
]

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "write_inventory,read_inventory,read_locations,read_orders,read_products,write_products"
optional_scopes = [ ]
# Required false so app-specific compliance webhooks can be deployed (App Store automated checks).
use_legacy_install_flow = false

[auth]
redirect_urls = [ "https://stockme.gentletap.co/api/auth/callback" ]

[pos]
embedded = false
